<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une dépense</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">Ajouter une dépense</h1>

    <form>
        <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" class="form-control" placeholder="Ex: Restaurant" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Montant (€)</label>
            <input type="number" class="form-control" placeholder="Ex: 50" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Payé par</label>
            <input type="text" class="form-control" placeholder="Ex: Yasmine">
        </div>

        <div class="mb-3">
            <label class="form-label">Groupe</label>
            <select class="form-select">
                <option>Coloc</option>
                <option>Vacances</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Ajouter</button>
    </form>
</div>

</body>
</html>
