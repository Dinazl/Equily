<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une dépense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

     <!-- Flèche -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <a href="javascript:history.back()" class="back-btn">
    <i class="bi bi-arrow-left"></i>
    </a>

<div class="container mt-5">
    <h1 class="mb-4">Ajouter une dépense</h1>

    <form id="addForm">
        <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" class="form-control" placeholder="Ex: Restaurant" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Montant (€)</label>
            <input type="number" class="form-control" placeholder="Ex: 50" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Payé par</label>
            <input type="text" class="form-control" placeholder="Ex: Yasmine">
        </div>

        <div class="mb-3">
            <label class="form-label">Groupe</label>
            <select class="form-select">
                <option>Coloc</option>
                <option>Vacances</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Ajouter</button>
    </form>
</div>

<!-- JS -->
<script>
document.getElementById("addForm").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("Dépense ajoutée avec succès !");
    this.reset();
});
</script>


</body>
</html>
