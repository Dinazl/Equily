<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une dépense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ton CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>

<!-- Bouton retour -->
<a href="javascript:history.back()" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<div class="container mt-5">
    <h1 class="mb-4">Ajouter une dépense</h1>

    <!-- ✅ AJOUT action + method -->
    <form id="addForm" action="#" method="POST">

        <!-- TITRE -->
        <div class="mb-3">
            <!-- ✅ label lié à input -->
            <label for="title" class="form-label">Titre</label>

            <!-- ✅ id + name -->
            <input 
                type="text" 
                id="title" 
                name="title"
                class="form-control" 
                placeholder="Ex: Restaurant" 
                required>
        </div>

        <!-- MONTANT -->
        <div class="mb-3">
            <!-- ✅ lien label/input -->
            <label for="amount" class="form-label">Montant (€)</label>

            <input 
                type="number" 
                id="amount" 
                name="amount"
                class="form-control" 
                placeholder="Ex: 50" 
                required>
        </div>

        <!-- PAYÉ PAR -->
        <div class="mb-3">
            <label for="payer" class="form-label">Payé par</label>

            <input 
                type="text" 
                id="payer" 
                name="payer"
                class="form-control" 
                placeholder="Ex: Yasmine">
        </div>

        <!-- GROUPE -->
        <div class="mb-3">
            <label for="group" class="form-label">Groupe</label>

            <select 
                id="group" 
                name="group"
                class="form-select" 
                required>

                <option value="">Choisir un groupe</option>
                <option value="coloc">Coloc</option>
                <option value="vacances">Vacances</option>

            </select>
        </div>

        <!-- BOUTON -->
        <button type="submit" class="btn btn-primary">
            Ajouter
        </button>

    </form>
</div>

<!-- JS -->
<script>
document.getElementById("addForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // ✅ récupération propre des valeurs
    const data = {
        title: document.getElementById("title").value,
        amount: document.getElementById("amount").value,
        payer: document.getElementById("payer").value,
        group: document.getElementById("group").value
    };

    console.log(data);

    alert("Dépense ajoutée avec succès !");
    this.reset();
});
</script>

</body>
</html>
