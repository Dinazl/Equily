<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une dépense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>

<!-- Bouton retour -->
<a href="javascript:history.back()" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<div class="container mt-5">
    <h1 class="mb-4">Modifier une dépense</h1>

    <!-- action + method -->
    <form id="editForm" action="#" method="post">

        <!-- TITRE -->
        <div class="mb-3">
            <!-- label lié -->
            <label for="title" class="form-label">Titre</label>

            <!-- id + name -->
            <input 
                type="text" 
                id="title" 
                name="title"
                class="form-control" 
                placeholder="Ex: Restaurant" 
                required>
        </div>

        <!-- MONTANT -->
        <div class="mb-3">
            <label for="amount" class="form-label">Montant (€)</label>

            <input 
                type="number" 
                id="amount" 
                name="amount"
                class="form-control" 
                placeholder="Ex: 67" 
                min="0"
                step="0.01"
                required>
        </div>

        <!-- BONUS -->
        <div class="mb-3">
            <label for="payer" class="form-label">Payé par</label>

            <input 
                type="text" 
                id="payer" 
                name="payer"
                class="form-control" 
                placeholder="Ex: Dina" >
        </div>

        <div class="mb-3">
            <label for="group" class="form-label">Groupe</label>

            <select 
                id="group" 
                name="group"
                class="form-select">

                <option value="coloc" selected>Coloc</option>
                <option value="vacances">Vacances</option>

            </select>
        </div>

        <!-- BOUTON -->
        <button type="submit" class="btn btn-warning">
            Modifier la dépense
        </button>

    </form>
</div>

<!-- JS -->
<script>
document.getElementById("editForm").addEventListener("submit", function(e) {
    e.preventDefault();

    //récupération propre
    const data = {
        title: document.getElementById("title").value,
        amount: document.getElementById("amount").value,
        payer: document.getElementById("payer").value,
        group: document.getElementById("group").value
    };

    console.log(data);

    alert("Dépense modifiée avec succès !");
});
</script>

</body>
</html>
