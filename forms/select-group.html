<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir un groupe</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>

<!-- Bouton retour -->
<a href="javascript:history.back()" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<div class="container mt-5">
    <h1 class="mb-4">Choisir un groupe</h1>

    <!-- action + method -->
    <form id="groupForm" action="#" method="post">

        <div class="mb-3">
            <!-- label lié -->
            <label for="group" class="form-label">Groupe</label>

            <!-- id + name -->
            <select 
                id="group" 
                name="group"
                class="form-select" 
                required>

                <!-- option par défaut -->
                <option value="">-- Sélectionner un groupe --</option>

                <option value="coloc">Coloc</option>
                <option value="vacances">Vacances</option>
                <option value="anniversaire">Anniversaire</option>

            </select>
        </div>

        <!-- bouton clair -->
        <button type="submit" class="btn btn-success">
            Valider
        </button>

    </form>

    <!-- retour propre -->
    <a href="index.html" class="btn btn-secondary mt-3">
        Retour à l'accueil
    </a>
</div>

<!-- JS -->
<script>
document.getElementById("groupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const selectedGroup = document.getElementById("group").value;

    if (!selectedGroup) {
        alert("Veuillez sélectionner un groupe !");
        return;
    }

    console.log("Groupe sélectionné :", selectedGroup);

    alert("Groupe sélectionné !");
});
</script>

</body>
</html>
